<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" width="120" height="36">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&amp;display=swap');
      
      .dynamic-bg {
        fill: #000000;
      }
      .dynamic-text {
        fill: #ffffff;
      }
      .dynamic-crm {
        fill: #000000;
      }

      @media (prefers-color-scheme: dark) {
        .dynamic-bg {
          fill: #ffffff;
        }
        .dynamic-text {
          fill: #000000;
        }
        .dynamic-crm {
          fill: #ffffff;
        }
      }
    </style>
  </defs>

  <!-- Number Badge -->
  <rect x="0" y="0" width="36" height="36" rx="10" class="dynamic-bg" />
  <text x="18" y="24" text-anchor="middle" font-family="'Inter', sans-serif" font-weight="900" font-size="18" letter-spacing="-1" class="dynamic-text">
    17
  </text>
  
  <!-- CRM Text -->
  <text x="44" y="27" font-family="'Inter', sans-serif" font-weight="900" font-size="24" letter-spacing="-2" class="dynamic-crm">
    CRM
  </text>
</svg>
