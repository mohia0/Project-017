<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon Options - Proposal Signed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 40px;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
            transition: all 0.3s ease;
        }

        .icon-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .glass-icon {
            width: 80px;
            height: 80px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .icon-label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 14px;
            color: #111;
        }
    </style>
</head>
<body>

    <h1 class="text-4xl font-bold text-gray-900 mb-12">Success Icon Options</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
        <!-- Option 1: Handshake -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="m11 17 2 2a1 1 0 1 0 3-3" />
                  <path d="m14 14 2.5 2.5a1 1 0 1 0 3-3l-3.88-3.88a3 3 0 0 0-4.24 0l-.88.88a1 1 0 1 1-3-3l2.81-2.81a5.79 5.79 0 0 1 7.06-.87l.47.28a2 2 0 0 0 1.42.25L21 4" />
                  <path d="m21 3-6 6" />
                  <path d="m21 14-6.5-6.5" />
                  <path d="m3 21 6-6" />
                  <path d="m3 14 6.5 6.5" />
                </svg>
            </div>
            <div class="icon-label">Handshake</div>
        </div>

        <!-- Option 2: File Signature -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 19.5v.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8.5L18 5.5"/>
                  <path d="M8 18h1"/>
                  <path d="M18.42 9.61a2.1 2.1 0 1 1 2.97 2.97L16.95 17 13 18l.99-3.95 4.43-4.44Z"/>
                </svg>
            </div>
            <div class="icon-label">File Signature</div>
        </div>

        <!-- Option 3: Feather Pen -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M12.67 19a2 2 0 0 0 1.416-.588l6.154-6.172a6 6 0 0 0-8.49-8.49L5.586 9.914A2 2 0 0 0 5 11.328V18a1 1 0 0 0 1 1z"/>
                  <path d="M16 8 2 22"/>
                  <path d="M17.5 15H9"/>
                </svg>
            </div>
            <div class="icon-label">Feather Pen</div>
        </div>

        <!-- Option 4: Scroll / Contract -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M8 21h12a2 2 0 0 0 2-2v-2H10v2a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v3h4"/>
                  <path d="M19 17V5a2 2 0 0 0-2-2H4"/>
                  <path d="M15 8h-5"/>
                  <path d="M15 12h-5"/>
                </svg>
            </div>
            <div class="icon-label">Scroll Contract</div>
        </div>

        <!-- Option 5: Briefcase / Deal -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="20" height="14" x="2" y="7" rx="2" ry="2"/>
                  <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
                </svg>
            </div>
            <div class="icon-label">Deal Closed</div>
        </div>

        <!-- Option 6: Stamp -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 22h14"/>
                  <path d="M19 22V11c0-1.1-.9-2-2-2h-2V7c0-2.8-2.2-5-5-5S5 4.2 5 7v2H3c-1.1 0-2 .9-2 2v11"/>
                  <path d="M7 22V7"/>
                  <path d="M17 22V7"/>
                  <path d="M7 7h10"/>
                </svg>
            </div>
            <div class="icon-label">Approval Stamp</div>
        </div>

        <!-- Option 7: Clipboard Check -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="8" height="4" x="8" y="2" rx="1" ry="1"/>
                  <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                  <path d="m9 14 2 2 4-4"/>
                </svg>
            </div>
            <div class="icon-label">Signed & Approved</div>
        </div>

        <!-- Option 8: Pen -->
        <div class="icon-card">
            <div class="glass-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/>
                  <path d="m15 5 4 4"/>
                </svg>
            </div>
            <div class="icon-label">Signature Pen</div>
        </div>

    </div>

</body>
</html>
