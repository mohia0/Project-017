<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broken Image Fallback Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        .grid-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .img-container {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dark .img-container {
            border-color: #333;
        }
    </style>
</head>
<body class="bg-gray-50 transition-colors duration-300">

    <div class="p-8 max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold">Minimal Broken Image Fallback</h1>
            <button onclick="document.body.classList.toggle('dark'); document.body.classList.toggle('bg-gray-900'); document.body.classList.toggle('bg-gray-50')" 
                    class="px-4 py-2 bg-black text-white dark:bg-white dark:text-black rounded-lg text-sm font-medium">
                Toggle Dark Mode
            </button>
        </div>

        <p class="text-gray-500 dark:text-gray-400 mb-8">
            This preview demonstrates how the global error handler intercepts broken images 
            and replaces them with our new super-minimal SVG placeholder.
        </p>

        <div class="grid-preview">
            <!-- These images have broken paths -->
            <div class="flex flex-col gap-2">
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Square</span>
                <div class="img-container">
                    <img src="broken-1.jpg" class="w-full h-full" alt="Broken image 1">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Portrait</span>
                <div class="img-container">
                    <img src="broken-2.png" class="w-24 h-32" alt="Broken image 2">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Landscape</span>
                <div class="img-container">
                    <img src="non-existent.svg" class="w-32 h-20" alt="Broken image 3">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Circle</span>
                <div class="img-container rounded-full overflow-hidden">
                    <img src="error.webp" class="w-full h-full" alt="Broken image 4">
                </div>
            </div>
        </div>
    </div>

    <script>
        // The exact logic from our GlobalImageErrorHandler.tsx
        const BROKEN_IMAGE_FALLBACK = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><rect x='3' y='3' width='18' height='18' rx='4' stroke='%23888888' stroke-width='0.8' opacity='0.2'/><text x='12' y='11' text-anchor='middle' fill='%23888888' font-family='system-ui, sans-serif' font-size='2.2' font-weight='800' letter-spacing='0.5' opacity='0.4'>IMAGE</text><text x='12' y='15' text-anchor='middle' fill='%23888888' font-family='system-ui, sans-serif' font-size='2.2' font-weight='800' letter-spacing='0.5' opacity='0.4'>BROKEN</text></svg>";

        function initGlobalHandler() {
            const handleError = (e) => {
                const target = e.target;
                if (target && target.tagName && target.tagName.toLowerCase() === 'img') {
                    const img = target;
                    if (img.dataset.ignoreGlobalHandler === 'true') return;
                    if (img.src !== BROKEN_IMAGE_FALLBACK && !img.dataset.fallbackApplied) {
                        img.dataset.fallbackApplied = 'true';
                        img.src = BROKEN_IMAGE_FALLBACK;
                        
                        if (!img.style.objectFit) {
                            img.style.objectFit = 'contain';
                        }
                        if (!img.style.backgroundColor) {
                            // Using standard classes for the demo background
                            img.classList.add('bg-black/[0.03]');
                            img.classList.add('dark:bg-white/[0.03]');
                        }
                    }
                }
            };

            window.addEventListener('error', handleError, true);
        }

        initGlobalHandler();
    </script>
</body>
</html>
